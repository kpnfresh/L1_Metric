<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KPN Fresh — MoM Performance Dashboard</title>
<style>
/* ═══════════════════════════════════════════════
   RESET & ROOT VARIABLES
═══════════════════════════════════════════════ */
:root {
  --bg:       #eef1f7;
  --white:    #ffffff;
  --navy:     #0f2547;
  --navy2:    #1a3a6b;
  --blue:     #1d4ed8;
  --blue2:    #2563eb;
  --teal:     #0e7490;
  --teal2:    #0891b2;
  --dkgreen:  #14532d;
  --green:    #15803d;
  --pur:      #5b21b6;
  --pur2:     #6d28d9;
  --brn:      #78350f;
  --brn2:     #92400e;

  /* sub-header tints */
  --sub-blu:  #dbeafe;
  --sub-tel:  #cffafe;
  --sub-grn:  #dcfce7;
  --sub-pur:  #ede9fe;
  --sub-brn:  #fef3c7;
  --sub-nav:  #e0e7ff;

  /* cell tints per group */
  --cell-a:   #f0f4ff;
  --cell-b:   #edf5ff;
  --cell-c:   #e6fbff;
  --cell-d:   #e8fff2;
  --cell-e:   #f5f3ff;
  --cell-f:   #fff8ed;

  /* text */
  --tx:    #111827;
  --tx2:   #374151;
  --tx3:   #6b7280;
  --tx4:   #9ca3af;

  /* accents */
  --grn-tx:  #14532d;
  --grn-bg:  #bbf7d0;
  --red-tx:  #7f1d1d;
  --red-bg:  #fecaca;
  --neu-bg:  #e5e7eb;

  --shadow: 0 2px 12px rgba(0,0,0,.08);
  --f: 'Inter', system-ui, sans-serif;
  --r: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--tx); font-family: var(--f); font-size: 13px; min-height: 100vh; }

/* ═══════════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════════ */
.topbar {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  color: #fff; padding: 12px 22px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
}
.brand { font-size: 16px; font-weight: 800; letter-spacing: -.4px; }
.brand em { color: #93c5fd; font-style: normal; }
.brand small { display: block; font-size: 10px; color: #93c5fd; font-weight: 400; margin-top: 2px; }
.date-badge {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
  border-radius: 20px; padding: 5px 14px; font-size: 11px; font-weight: 700; color: #e0f2fe;
  display: flex; align-items: center; gap: 6px;
}
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80;
  box-shadow: 0 0 6px #4ade80; animation: pulse 1.8s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ═══════════════════════════════════════════════
   STICKY CONTROL BAR
═══════════════════════════════════════════════ */
.ctrlbar {
  background: var(--white); border-bottom: 2px solid #c7d2e8;
  padding: 8px 22px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 200; box-shadow: var(--shadow);
}
.ctrl-lbl { font-size: 9px; font-weight: 800; color: var(--tx3); text-transform: uppercase; letter-spacing: .7px; }

/* Cluster pills */
.cl-grp { display: flex; gap: 3px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 8px; padding: 3px; }
.cl-pill { padding: 5px 13px; border-radius: 6px; border: none; cursor: pointer;
  font-size: 11px; font-weight: 700; background: transparent; color: var(--tx2);
  transition: all .13s; white-space: nowrap; }
.cl-pill.on { background: var(--navy); color: #fff; box-shadow: 0 1px 4px rgba(15,37,71,.35); }
.cl-pill:hover:not(.on) { background: #e2e8f0; }

/* Channel pills */
.ch-grp { display: flex; gap: 3px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 8px; padding: 3px; }
.ch-pill { padding: 5px 12px; border-radius: 6px; border: none; cursor: pointer;
  font-size: 11px; font-weight: 700; background: transparent; color: var(--tx2); transition: all .13s; }
.ch-pill.on { background: #0e7490; color: #fff; }
.ch-pill:hover:not(.on) { background: #e2e8f0; }

/* ═══════════════════════════════════════════════
   CATEGORY FILTER BAR
═══════════════════════════════════════════════ */
.catbar {
  background: #f8fafc; border-bottom: 1px solid #e2e8f0;
  padding: 7px 22px; display: flex; gap: 5px; overflow-x: auto; align-items: center;
}
.cpill {
  padding: 3px 10px; border-radius: 20px; border: 1px solid #cbd5e1;
  background: var(--white); color: var(--tx2); font-size: 11px; font-weight: 500;
  cursor: pointer; white-space: nowrap; transition: all .12s; flex-shrink: 0;
}
.cpill.on { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 700; }
.cpill:hover:not(.on) { background: #e2e8f0; }

/* ═══════════════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════════════ */
.main { padding: 16px 22px; display: flex; flex-direction: column; gap: 22px; }

/* ═══════════════════════════════════════════════
   STORE BLOCK
═══════════════════════════════════════════════ */
.store-block { background: var(--white); border: 1px solid #c7d2e8; border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); }

/* Store header */
.store-hdr {
  background: linear-gradient(135deg, var(--navy) 0%, #1e3a6b 100%);
  color: #fff; padding: 11px 18px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
}
.sname { font-size: 14px; font-weight: 800; letter-spacing: .1px; }
.sid   { font-size: 10px; color: #93c5fd; font-family: monospace; margin-top: 2px; }
.kpi-row { display: flex; gap: 18px; flex-wrap: wrap; }
.kpi { text-align: right; }
.kpi-lbl { font-size: 9px; color: #93c5fd; text-transform: uppercase; letter-spacing: .5px; }
.kpi-val { font-size: 15px; font-weight: 800; margin-top: 1px; }
.kpi-val.pos { color: #86efac; }
.kpi-val.neg { color: #fca5a5; }
.kpi-val.yoy-pos { color: #fcd34d; }
.kpi-val.yoy-neg { color: #f87171; }

/* ═══════════════════════════════════════════════
   TABLE
═══════════════════════════════════════════════ */
.tw { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 960px; }

/* GROUP HEADER ROW */
thead tr.th-grp th {
  padding: 9px 6px; font-size: 11px; font-weight: 800;
  color: #fff; text-align: center; text-transform: uppercase; letter-spacing: .5px;
  border: 1.5px solid rgba(255,255,255,.3);
}
thead tr.th-grp .h-cat  { background: #1e293b; text-align: left; min-width: 160px; }
thead tr.th-grp .h-apr  { background: #1e40af; }
thead tr.th-grp .h-may  { background: #2563eb; }
thead tr.th-grp .h-maym { background: #0e7490; }
thead tr.th-grp .h-junm { background: #14532d; }
thead tr.th-grp .h-mom  { background: #5b21b6; }
thead tr.th-grp .h-yoy  { background: #78350f; }

/* SUB HEADER ROW */
thead tr.th-sub th {
  padding: 6px 8px; font-size: 10px; font-weight: 800;
  text-align: center; letter-spacing: .4px; text-transform: uppercase;
  border: 1.5px solid #b6c5d8;
}
thead tr.th-sub .sh-cat  { background: #f1f5f9; color: #1e293b; text-align: left; }
thead tr.th-sub .sh-apr  { background: var(--sub-nav); color: #1e40af; }
thead tr.th-sub .sh-may  { background: var(--sub-blu); color: var(--blue); }
thead tr.th-sub .sh-maym { background: var(--sub-tel); color: var(--teal); }
thead tr.th-sub .sh-junm { background: var(--sub-grn); color: var(--dkgreen); }
thead tr.th-sub .sh-mom  { background: var(--sub-pur); color: var(--pur); }
thead tr.th-sub .sh-yoy  { background: var(--sub-brn); color: var(--brn); }

/* DATA ROWS */
tbody td {
  padding: 7px 8px; text-align: center;
  border: 1.5px solid #d1dae8; font-size: 12px;
  vertical-align: middle; white-space: nowrap;
}
tbody td:first-child {
  text-align: left; font-weight: 600; color: var(--tx);
  background: #f8faff; border-left: 3px solid #b6c5d8;
  padding-left: 14px;
}
/* Column-group cell tints */
tbody td.ca { background: var(--cell-a); }
tbody td.cb { background: var(--cell-b); }
tbody td.cc { background: var(--cell-c); }
tbody td.cd { background: var(--cell-d); }
tbody td.ce { background: var(--cell-e); }
tbody td.cf { background: var(--cell-f); }

tbody tr:hover td      { filter: brightness(.96); }
tbody tr:hover td:first-child { background: #dbeafe !important; }

/* TOTAL ROW */
tr.tr-tot td {
  background: #e8f0fe !important; font-weight: 800; font-size: 12px;
  border-top: 2.5px solid var(--blue) !important;
  border-bottom: 2.5px solid var(--blue) !important;
  color: var(--navy) !important;
}
tr.tr-tot td:first-child {
  color: var(--blue2) !important; font-weight: 800; font-size: 12px;
  border-left: 4px solid var(--blue2) !important;
}

/* ═══════════════════════════════════════════════
   FRESH PRODUCE PRIORITY ROWS (Fresh Fruits & Fresh Vegetables)
═══════════════════════════════════════════════ */
tr.tr-produce td {
  background: #f0fdf4 !important;
  border-color: #86efac !important;
}
tr.tr-produce td:first-child {
  background: #dcfce7 !important;
  border-left: 4px solid #16a34a !important;
  font-weight: 800 !important;
  color: #14532d !important;
  font-size: 12.5px;
  letter-spacing: .1px;
}
tr.tr-produce:hover td      { filter: brightness(.94) !important; }
tr.tr-produce:hover td:first-child { background: #bbf7d0 !important; }

/* Core Produce Divider */
tr.tr-produce-divider td {
  background: linear-gradient(90deg, #16a34a, #15803d) !important;
  color: #fff;
  font-size: 9px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1.2px;
  padding: 4px 14px; text-align: left !important;
  border: none !important;
  box-shadow: inset 0 -1px 0 rgba(255,255,255,.2);
}

/* ═══════════════════════════════════════════════
   VALUE HELPERS
═══════════════════════════════════════════════ */
.nd { color: #d1d5db; font-size: 11px; }
.val-up { color: var(--grn-tx); font-weight: 700; }
.val-dn { color: var(--red-tx); font-weight: 700; }
.val-n  { color: var(--tx2); font-weight: 600; }

/* Arrow badges */
.arr { display: inline-flex; align-items: center; gap: 3px; }
.arr-up { color: var(--green); font-weight: 800; }
.arr-dn { color: #dc2626; font-weight: 800; }
.arr-sym { font-size: 9px; }

/* Growth badge pills */
.gb { display: inline-block; padding: 2px 6px; border-radius: 5px; font-size: 10px; font-weight: 800; }
.gb-p { background: var(--grn-bg); color: var(--grn-tx); }
.gb-n { background: var(--red-bg); color: var(--red-tx); }
.gb-z { background: var(--neu-bg); color: var(--tx3); }

/* ═══════════════════════════════════════════════
   AI INSIGHTS PANEL
═══════════════════════════════════════════════ */
.ai-panel {
  border: 1px solid #ddd6fe; border-radius: var(--r);
  background: linear-gradient(135deg,rgba(91,33,182,.04),rgba(29,78,216,.03));
  overflow: hidden;
}
.ai-panel-hdr {
  background: linear-gradient(90deg, #4c1d95, #3730a3);
  color: #fff; padding: 10px 18px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.ai-panel-hdr h3 { font-size: 12px; font-weight: 800; display: flex; align-items: center; gap: 7px; }
.ai-panel-hdr h3::before { content: '✦'; font-size: 11px; color: #c4b5fd; }
.ai-store-name { font-size: 11px; color: #c4b5fd; font-weight: 600; }
.ai-body { padding: 14px 18px; }
.ai-loading { display: flex; align-items: center; gap: 8px; color: #6d28d9; font-size: 11px; font-weight: 600; }
.spin { width: 14px; height: 14px; border: 2px solid #ddd6fe; border-top-color: #7c3aed; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.insights-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 10px; }
.insights-grid .ins-card.warn { grid-column: span 2; }
@media (max-width: 640px) {
  .insights-grid .ins-card.warn { grid-column: span 1; }
}
.ins-card {
  background: var(--white); border-radius: 8px; padding: 11px 14px;
  border-left: 4px solid #ddd6fe;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.ins-card.good { border-left-color: #22c55e; }
.ins-card.bad  { border-left-color: #ef4444; }
.ins-card.warn { border-left-color: #f59e0b; }
.ins-card.info { border-left-color: #3b82f6; }
.ins-tag { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .7px; margin-bottom: 5px; }
.ins-card.good .ins-tag { color: #15803d; }
.ins-card.bad  .ins-tag { color: #b91c1c; }
.ins-card.warn .ins-tag { color: #d97706; }
.ins-card.info .ins-tag { color: #1d4ed8; }
.ins-msg { font-size: 11px; color: #374151; line-height: 1.55; }
.ins-msg strong { color: #111827; }
.ins-msg ul.ins-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
.ins-msg ul.ins-list li {
  position: relative; padding-left: 14px;
}
.ins-msg ul.ins-list li::before {
  content: '▸'; position: absolute; left: 0; color: #d97706; font-weight: 800;
}

/* ═══════════════════════════════════════════════
   FOOTER NOTE
═══════════════════════════════════════════════ */
.fnote {
  background: var(--white); border: 1px solid #e2e8f0; border-radius: var(--r);
  padding: 10px 18px; font-size: 11px; color: var(--tx3);
  display: flex; gap: 18px; flex-wrap: wrap; box-shadow: var(--shadow);
}
.fnote strong { color: var(--tx2); }

@media (max-width:640px) {
  .main { padding: 10px; }
  .ctrlbar { padding: 8px 10px; }
  .catbar { padding: 6px 10px; }
}

/* ═══════════════════════════════════════════════
   LOADING OVERLAY
═══════════════════════════════════════════════ */
#loadingOverlay{
  position:fixed; inset:0; z-index:9999;
  background:linear-gradient(135deg,#0f2547 0%, #1a3a6b 100%);
  display:flex; align-items:center; justify-content:center;
  transition:opacity .35s ease, visibility .35s ease;
}
#loadingOverlay.hide{ opacity:0; visibility:hidden; }
.loader-box{
  text-align:center; color:#fff; padding:28px;
  width:min(92vw, 420px);
}
.loader-logo{
  width:140px; height:140px; object-fit:contain;
  border-radius:50%;
  box-shadow:0 8px 24px rgba(0,0,0,.28);
  margin-bottom:18px;
  animation:float 2.4s ease-in-out infinite;
}
@keyframes float{
  0%,100%{ transform:translateY(0px); }
  50%{ transform:translateY(-6px); }
}
.loader-title{
  font-size:22px; font-weight:800; letter-spacing:.4px;
}
.loader-sub{
  margin-top:8px; font-size:13px; color:#cbd5e1; line-height:1.5;
}
.loader-bar{
  width:100%; height:10px; margin-top:18px;
  background:rgba(255,255,255,.18);
  border-radius:999px; overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
}
.loader-bar span{
  display:block; height:100%; width:42%;
  background:linear-gradient(90deg,#22c55e,#eab308,#22c55e);
  background-size:200% 100%;
  border-radius:999px;
  animation:loadMove 1.3s linear infinite;
}
@keyframes loadMove{
  0%{ transform:translateX(-100%); }
  100%{ transform:translateX(240%); }
}
.loader-note{
  margin-top:12px; font-size:11px; color:#93c5fd;
  letter-spacing:.3px;
}

</style>
</head>

/* ═══════════════════════════════════════════════
   DATE-WISE MTD HELPERS
   The sheet has one row per (site, category, channel, DATE).
   To get correct totals we must:
     1) SUM every matching row (not just keep the last one)
     2) For MTD columns, only include rows whose date-of-month
        falls within 1..dtd (e.g. 1–13)
═══════════════════════════════════════════════ */
// Columns that are definitely NOT the per-row date column —
// used to help auto-detect which column holds the date.
const NON_DATE_FIELDS = ['Cluster','site_id','category_name','order_Source','total_quantity','GMV','Month','__yr'];

// Parse common date string/serial formats into a JS Date.
function parseDateStr(raw){
  if (raw == null) return null;
  const s = String(raw).trim();
  if (!s) return null;

  // yyyy-mm-dd or yyyy/mm/dd
  let m = s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);

  // dd-Mon-yy(yy)  e.g. 1-Apr-2026, 01 Apr 26
  m = s.match(/^(\d{1,2})[-\s\/](Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*[-\s\/](\d{2,4})/i);
  if (m) {
    const MO = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    const mon = MO[m[2].toLowerCase()];
    let yr = +m[3]; if (yr < 100) yr += 2000;
    return new Date(yr, mon, +m[1]);
  }

  // dd/mm/yyyy, mm/dd/yyyy or dd-mm-yyyy
  m = s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
  if (m) {
    let a=+m[1], b=+m[2], yr=+m[3], day, mon;
    if (a > 12) { day=a; mon=b; }
    else if (b > 12) { day=b; mon=a; }
    else { day=a; mon=b; } // ambiguous -> assume DD/MM (India default)
    return new Date(yr, mon-1, day);
  }

  // Excel serial date number
  if (/^\d{4,6}(\.\d+)?$/.test(s)) {
    const n = Number(s);
    if (n > 20000 && n < 60000) {
      const epoch = new Date(1899,11,30);
      return new Date(epoch.getTime() + Math.round(n)*86400000);
    }
  }
  return null;
}

// Auto-detect which column in the sheet holds the per-row date,
// so MTD (1..dtd) filtering can be applied correctly.
function detectDateField(rows){
  if (!rows.length) return null;
  const headers = Object.keys(rows[0]).filter(h => !NON_DATE_FIELDS.includes(h));
  const sample = rows.slice(0, Math.min(300, rows.length));
  const scored = [];
  for (const h of headers) {
    let ok=0, total=0;
    for (const r of sample) {
      const v = r[h];
      if (v === undefined || v === '') continue;
      total++;
      if (parseDateStr(v)) ok++;
    }
    if (total === 0) continue;
    const ratio = ok/total;
    if (ratio >= 0.8) scored.push({ h, ratio, nameBoost: /date|day/i.test(h) ? 1 : 0 });
  }
  if (!scored.length) return null;
  scored.sort((x,y) => (y.nameBoost-x.nameBoost) || (y.ratio-x.ratio));
  return scored[0].h;
}

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
function buildDC() {
  const now   = new Date();

  // ── MTD Day Counter Validation (Fix #3) ─────────────────────────────
  // Rule: header must show (1 – D-1). If today is the 13th, display (1–12).
  // If today is the 1st (first day of month), show (1–<last day of prev month>)
  // so the range is never empty/zero.
  const dMinus1 = new Date(now); dMinus1.setDate(now.getDate() - 1);
  // If D-1 rolls back into prior month, getDate() still gives the correct day.
  const dtdDay  = dMinus1.getDate();
  // Validation assertion (logged to console for debugging):
  console.assert(dtdDay >= 1 && dtdDay <= 31, `[MTD] dtdDay out of range: ${dtdDay}`);
  console.log(`[MTD] Today: ${now.getDate()}, D-1 day used for header: ${dtdDay} → header shows (1–${dtdDay})`);
  // ─────────────────────────────────────────────────────────────────────

  const curr  = new Date(now.getFullYear(), now.getMonth(), 1);
  const m1    = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const m2    = new Date(now.getFullYear(), now.getMonth() - 2, 1);
  const ly    = new Date(now.getFullYear() - 1, now.getMonth(), 1);

  const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const lbl = d => MO[d.getMonth()] + "'" + String(d.getFullYear()).slice(2);
  const key = d => String(d.getFullYear()) + String(d.getMonth()+1).padStart(2,'0');

  return {
    dtdDay,
    m2:   { lbl: lbl(m2),   key: key(m2)   },   // Apr'26
    m1:   { lbl: lbl(m1),   key: key(m1)   },   // May'26
    curr: { lbl: lbl(curr), key: key(curr) },   // Jun'26
    ly:   { lbl: lbl(ly),   key: key(ly)   },   // Jun'25
    todayStr: now.toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'})
  };
}

function fq(v) {
  if (v == null) return '<span class="nd">—</span>';
  if (v >= 1e5)  return (v/1e5).toFixed(2) + 'L';
  if (v >= 1e3)  return (v/1e3).toFixed(1) + 'K';
  return v.toFixed(0);
}
function fg(v) {
  if (v == null) return '<span class="nd">—</span>';
  if (v >= 1e7)  return '₹' + (v/1e7).toFixed(2) + 'Cr';
  if (v >= 1e5)  return '₹' + (v/1e5).toFixed(2) + 'L';
  if (v >= 1e3)  return '₹' + (v/1e3).toFixed(1) + 'K';
  return '₹' + Math.round(v);
}

/* Value cell with inline arrow after value (e.g. 3.1K ▲ or ₹59.7K ▼)
   Arrow is placed AFTER the value string as per spec. */
function vcell(val, prev, isGmv) {
  const fmtd = isGmv ? fg(val) : fq(val);
  if (val == null || prev == null) return `<span class="val-n">${fmtd}</span>`;
  const delta = val - prev;
  if (delta > 0) return `<span class="val-up">${fmtd} <span class="arr-sym arr-up">▲</span></span>`;
  if (delta < 0) return `<span class="val-dn">${fmtd} <span class="arr-sym arr-dn">▼</span></span>`;
  return `<span class="val-n">${fmtd}</span>`;
}

/* Growth badge — used for MoM MTD % and YoY MTD % columns.
   Full-Month MoM comparison (Apr'26 Full vs May'26 Full):
     → Apr'26 Full = data key 'a' (m2), May'26 Full = data key 'b' (m1)
     → In vcell(bg, ag, true): May'26 Full GMV ▲/▼ vs Apr'26 Full GMV ✓
   MTD MoM comparison (May'26 MTD vs Jun'26 MTD):
     → May'26 MTD = 'c', Jun'26 MTD = 'd'
     → gbadge(dg, cg): Jun MTD vs May MTD ✓
   YoY MTD comparison (Jun'25 MTD vs Jun'26 MTD):
     → Jun'25 MTD = 'e', Jun'26 MTD = 'd'
     → gbadge(dg, eg): Jun'26 MTD vs Jun'25 MTD ✓ */
function gbadge(curr, prev) {
  if (curr == null || prev == null || prev === 0)
    return '<span class="nd">—</span>';
  const p = (curr - prev) / prev * 100;
  const cls = p > 0 ? 'gb-p' : p < 0 ? 'gb-n' : 'gb-z';
  const sym = p > 0 ? '▲ +' : p < 0 ? '▼ ' : '';
  return `<span class="gb ${cls}">${sym}${p.toFixed(1)}%</span>`;
}

/* ═══════════════════════════════════════════════
   RULE-BASED INSIGHT GENERATOR (Client-side fallback)
═══════════════════════════════════════════════ */
function generateRuleBasedInsights(storeName, storeId, catsToShow, storeInfo) {
  const rows = [];
  for (const cat of catsToShow) {
    if (AI_EXCLUDED_CATS.includes(cat)) continue; // strip Uncategorized from AI feed
    const e = storeInfo.cats[cat]?.[S.ch];
    if (!e) continue;
    const aq=e.a?.[0]??null, ag=e.a?.[1]??null;
    const bq=e.b?.[0]??null, bg=e.b?.[1]??null;
    const cq=e.c?.[0]??null, cg=e.c?.[1]??null;
    const dq=e.d?.[0]??null, dg=e.d?.[1]??null;
    const eq=e.e?.[0]??null, eg=e.e?.[1]??null;
    if (dg == null) continue;
    const momGpct = (cg&&dg&&cg>0) ? (dg-cg)/cg*100 : null;
    const momQpct = (cq&&dq&&cq>0) ? (dq-cq)/cq*100 : null;
    const yoyGpct = (eg&&dg&&eg>0) ? (dg-eg)/eg*100 : null;
    rows.push({ cat, aq, ag, bq, bg, cq, cg, dq, dg, eq, eg, momGpct, momQpct, yoyGpct });
  }
  if (!rows.length) return [{ type:'info', tag:'No Data', msg:'No category data available for the selected view.' }];

  const fmt = v => v >= 1e7 ? '₹'+(v/1e7).toFixed(2)+'Cr' : v >= 1e5 ? '₹'+(v/1e5).toFixed(2)+'L' : v >= 1e3 ? '₹'+(v/1e3).toFixed(1)+'K' : '₹'+Math.round(v);
  const pct = v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%';

  const insights = [];

  /* ───────────────────────────────────────────────
     1) THE POSITIVE INSIGHT (THE WIN)
     Exactly one strong, data-driven positive highlight —
     best-performing core category or growth metric.
  ─────────────────────────────────────────────── */
  const winCandidates = rows.filter(r => r.dg != null && r.dg > 0);
  let winCat = null;

  // Prefer a category with strong positive MoM GMV growth
  const momWinners = winCandidates.filter(r => r.momGpct != null && r.momGpct > 0)
                                   .sort((a,b) => b.momGpct - a.momGpct);
  if (momWinners.length) {
    winCat = momWinners[0];
    const share = winCandidates.reduce((s,r)=>s+(r.dg||0),0);
    const pctShare = share > 0 ? (winCat.dg/share*100).toFixed(1) : '—';
    insights.push({
      type: 'good',
      tag: '🏆 The Win',
      msg: `<strong>${winCat.cat}</strong> is the standout this ${DC.curr.lbl} MTD — GMV up ${pct(winCat.momGpct)} MoM to ${fmt(winCat.dg)} (${pctShare}% of store revenue). Strong momentum to build on.`
    });
  } else {
    // Fallback: highest GMV contributor overall
    const byGmv = [...winCandidates].sort((a,b) => b.dg - a.dg);
    winCat = byGmv[0];
    if (winCat) {
      const share = winCandidates.reduce((s,r)=>s+(r.dg||0),0);
      const pctShare = share > 0 ? (winCat.dg/share*100).toFixed(1) : '—';
      const isDeclining = (winCat.momGpct != null && winCat.momGpct < 0);
      insights.push({
        type: isDeclining ? 'info' : 'good',
        tag: '🏆 The Win',
        msg: isDeclining
          ? `<strong>${winCat.cat}</strong> is currently the store's largest revenue contributor at ${fmt(winCat.dg)} GMV (${pctShare}% share), however MTD GMV is down ${pct(winCat.momGpct)} versus last month and requires attention.`
          : `<strong>${winCat.cat}</strong> remains the store's top revenue driver this ${DC.curr.lbl} MTD with ${fmt(winCat.dg)} GMV, accounting for ${pctShare}% of total store revenue.`
      });
    }
  }

  /* ───────────────────────────────────────────────
     2) CLUSTER ACTION ITEMS (THE FOCUS POINTS)
     Bulleted operational action items, sorted by the
     strict category priority hierarchy. Built from
     volume/GMV gap anomalies — excludes the Win category.
  ─────────────────────────────────────────────── */
  // Keep categories with declines in action items even if they are the revenue winner
  const focusPool = rows.filter(r => {
    if (!winCat || r.cat !== winCat.cat) return true;
    return (r.momGpct != null && r.momGpct < 0) || (r.yoyGpct != null && r.yoyGpct < 0);
  });

  const actionItems = [];

  for (const r of focusPool) {
    // Price dilution: Qty up, GMV down/flat
    if (r.momQpct != null && r.momGpct != null && r.momQpct > 2 && r.momGpct < 0) {
      actionItems.push({
        cat: r.cat,
        rank: categoryPriorityRank(r.cat),
        text: `<strong>${r.cat}</strong>: Qty up ${pct(r.momQpct)} MoM but GMV down ${pct(r.momGpct)} — review pricing/mix to close the GMV gap.`
      });
      continue;
    }
    // GMV decline MoM
    if (r.momGpct != null && r.momGpct < 0) {
      actionItems.push({
        cat: r.cat,
        rank: categoryPriorityRank(r.cat),
        text: `<strong>${r.cat}</strong>: GMV down ${pct(r.momGpct)} MoM (${fmt(r.cg)} → ${fmt(r.dg)}) — prioritise replenishment and visibility to recover volume.`
      });
      continue;
    }
    // YoY decline (even if MoM is flat/positive)
    if (r.yoyGpct != null && r.yoyGpct < 0) {
      actionItems.push({
        cat: r.cat,
        rank: categoryPriorityRank(r.cat),
        text: `<strong>${r.cat}</strong>: YoY GMV down ${pct(r.yoyGpct)} — flag for cluster-level review against last year's MTD baseline.`
      });
      continue;
    }
  }

  // If no anomalies found, surface the lowest-growth categories as watch items
  if (!actionItems.length) {
    const lowGrowth = focusPool.filter(r => r.momGpct != null)
                                .sort((a,b) => a.momGpct - b.momGpct)
                                .slice(0, 3);
    for (const r of lowGrowth) {
      actionItems.push({
        cat: r.cat,
        rank: categoryPriorityRank(r.cat),
        text: `<strong>${r.cat}</strong>: GMV growth flat at ${pct(r.momGpct)} MoM — monitor closely and look for incremental volume opportunities.`
      });
    }
  }

  // Sort by strict category priority hierarchy (Fresh Fruits → ... → All Other)
  actionItems.sort((a,b) => a.rank - b.rank || a.cat.localeCompare(b.cat));

  if (actionItems.length) {
    const bullets = actionItems.slice(0, 5).map(a => `<li>${a.text}</li>`).join('');
    insights.push({
      type: 'warn',
      tag: '🎯 Cluster Action Items',
      msg: `<ul class="ins-list">${bullets}</ul>`
    });
  } else {
    insights.push({
      type: 'info',
      tag: '🎯 Cluster Action Items',
      msg: `No significant volume or GMV gaps detected against the category priority list this ${DC.curr.lbl} MTD.`
    });
  }

  return insights;
}

/* ═══════════════════════════════════════════════
   AI INSIGHTS  (API call with rule-based fallback)
═══════════════════════════════════════════════ */
async function fetchInsights(storeName, storeId, summaryRows, catsToShow, storeInfo) {
  const cacheKey = `${storeId}|${S.ch}|${S.cat}`;
  if (insightCache[cacheKey]) return insightCache[cacheKey];

  const priorityListStr = CATEGORY_PRIORITY.map((c,i) => `${i+1}. ${c}`).join('\n') +
    `\n${CATEGORY_PRIORITY.length+1}. All Other Categories (excluding Uncategorized)`;

  const prompt = `You are a senior retail data analyst at KPN Fresh, a grocery chain in Chennai.
Analyse the store-level category performance data below and generate the "Store Performance Insights" section for cluster managers.

Store: ${storeName} (${storeId}) · Channel: ${S.ch} · Date: ${DC.todayStr}
Columns: category | apr26_full_qty | apr26_full_gmv | may26_full_qty | may26_full_gmv | may26_mtd_qty | may26_mtd_gmv | jun26_mtd_qty | jun26_mtd_gmv | mom_qty_pct | mom_gmv_pct | yoy_qty_pct | yoy_gmv_pct

Data (Uncategorized has already been removed — do not refer to it):
${summaryRows}

MANDATORY CONTENT FILTER:
- The "Uncategorized" category has been excluded from the data above. Never mention, analyse, infer, or account for "Uncategorized" performance in any output, even implicitly.

STRICT OUTPUT STRUCTURE — exactly 2 objects in this order:
1. THE WIN (type: "good", tag: "🏆 The Win"): exactly ONE strong, data-driven positive highlight — the best-performing core category or growth metric for this store, to boost morale. One sharp sentence with real category names and % figures.
2. CLUSTER ACTION ITEMS (type: "warn", tag: "🎯 Cluster Action Items"): an HTML "<ul class=\\"ins-list\\">...</ul>" string containing 3-5 "<li>" bullet points. Each bullet is a targeted operational action item telling cluster managers exactly what to focus on more, based on volume or GMV gaps (declines, price dilution, YoY drops). Use real category names and % figures.

CATEGORY PRIORITY HIERARCHY — when selecting and ORDERING the Action Items bullets, sort strictly by this priority (highest first); a category higher on this list must appear before one lower on it if both have actionable gaps:
${priorityListStr}

RULES:
1. Return ONLY a valid JSON array of exactly 2 objects — no markdown fences, no preamble, no explanation.
2. Each object: { "type": "good"|"warn", "tag": "...", "msg": "..." }
3. Use real numbers from the data.`;

  // ── API attempt (with timeout) ──────────────────────────────────────
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 12000); // 12s timeout

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      signal: controller.signal,
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    clearTimeout(timer);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '';
    if (!text) throw new Error('Empty response');
    const clean = text.replace(/```json[\s\S]*?```|```[\s\S]*?```/g, s => s.replace(/```json|```/g,'')).trim();
    const parsed = JSON.parse(clean);
    if (!Array.isArray(parsed) || !parsed.length) throw new Error('Invalid JSON array');

    // ── Mandatory content filter: strip any "Uncategorized" mentions ──
    const filtered = parsed.filter(ins =>
      !/uncategorized/i.test(ins.tag || '') && !/uncategorized/i.test(ins.msg || '')
    );
    if (!filtered.length) throw new Error('All insights referenced excluded category');

    insightCache[cacheKey] = filtered;
    return filtered;

  } catch(e) {
    clearTimeout(timer);
    // ── Rule-based fallback: reads live page state data ──────────────
    console.warn('[Insights] API unavailable, using rule-based fallback:', e.message);
    const fallback = generateRuleBasedInsights(storeName, storeId, catsToShow, storeInfo);
    insightCache[cacheKey] = fallback;
    return fallback;
  }
}

function buildSummaryRows(storeInfo, catsToShow) {
  const rows = [];
  for (const cat of catsToShow) {
    if (AI_EXCLUDED_CATS.includes(cat)) continue; // strip Uncategorized from AI feed
    const e = storeInfo.cats[cat]?.[S.ch];
    if (!e) continue;
    const aq=e.a?.[0],ag=e.a?.[1],bq=e.b?.[0],bg=e.b?.[1];
    const cq=e.c?.[0],cg=e.c?.[1],dq=e.d?.[0],dg=e.d?.[1];
    const eq=e.e?.[0],eg=e.e?.[1];
    if (!dq && !dg) continue;
    const momQ = cq&&dq ? ((dq-cq)/cq*100).toFixed(1)+'%' : '—';
    const momG = cg&&dg ? ((dg-cg)/cg*100).toFixed(1)+'%' : '—';
    const yoyQ = eq&&dq ? ((dq-eq)/eq*100).toFixed(1)+'%' : '—';
    const yoyG = eg&&dg ? ((dg-eg)/eg*100).toFixed(1)+'%' : '—';
    rows.push(`${cat}|${aq??'—'}|${ag??'—'}|${bq??'—'}|${bg??'—'}|${cq??'—'}|${cg??'—'}|${dq??'—'}|${dg??'—'}|${momQ}|${momG}|${yoyQ}|${yoyG}`);
  }
  return rows.join('\n');
}

      if(s.a){ tAq+=s.a[0]||0; tAg+=s.a[1]||0; hA=true; }
      if(s.b){ tBq+=s.b[0]||0; tBg+=s.b[1]||0; hB=true; }
      if(s.c){ tCq+=s.c[0]||0; tCg+=s.c[1]||0; hC=true; }
      if(s.d){ tDq+=s.d[0]||0; tDg+=s.d[1]||0; hD=true; }
      if(s.e){ tEq+=s.e[0]||0; tEg+=s.e[1]||0; hE=true; }
    }
    if (!hD && !hC && !hB && !hA) continue;

    const momG = hC&&hD&&tCg>0 ? (tDg-tCg)/tCg*100 : null;
    const yoyG = hE&&hD&&tEg>0 ? (tDg-tEg)/tEg*100 : null;
    const momCls = momG==null?'':momG>=0?'pos':'neg';
    const yoyCls = yoyG==null?'':yoyG>=0?'yoy-pos':'yoy-neg';
    const momStr = momG!=null ? (momG>=0?'▲ +':'▼ ')+momG.toFixed(1)+'%' : '—';
    const yoyStr = yoyG!=null ? (yoyG>=0?'▲ +':'▼ ')+yoyG.toFixed(1)+'%' : '—';

    html += `
<div class="store-block">
  <!-- STORE HEADER -->
  <div class="store-hdr">
    <div>
      <div class="sname">${storeInfo.name}</div>
      <div class="sid">${siteId}</div>
    </div>
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-lbl">${curl} MTD GMV</div>
        <div class="kpi-val">${fg(hD?tDg:null)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">MoM GMV%</div>
        <div class="kpi-val ${momCls}">${momStr}</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">YoY GMV%</div>
        <div class="kpi-val ${yoyCls}">${yoyStr}</div>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="tw">
  <table>
    <thead>
      <tr class="th-grp">
        <th class="h-cat" rowspan="2">Category</th>
        <th class="h-apr"  colspan="2">${m2l} (FULL)</th>
        <th class="h-may"  colspan="2">${m1l} (FULL)</th>
        <th class="h-maym" colspan="2">${m1l} MTD (1–${dtd})</th>
        <th class="h-junm" colspan="2">${curl} MTD (1–${dtd})</th>
        <th class="h-mom"  colspan="2">${m1l} MTD vs ${curl} MTD</th>
        <th class="h-yoy"  colspan="2">${lyl} MTD vs ${curl} MTD (YoY)</th>
      </tr>
      <tr class="th-sub">
        <th class="sh-apr">QTY</th>  <th class="sh-apr">GMV</th>
        <th class="sh-may">QTY</th>  <th class="sh-may">GMV</th>
        <th class="sh-maym">QTY</th> <th class="sh-maym">GMV</th>
        <th class="sh-junm">QTY</th> <th class="sh-junm">GMV</th>
        <th class="sh-mom">QTY Δ%</th> <th class="sh-mom">GMV Δ%</th>
        <th class="sh-yoy">QTY Δ%</th> <th class="sh-yoy">GMV Δ%</th>
      </tr>
    </thead>
    <tbody>`;

    let totAq=0,totAg=0,totBq=0,totBg=0,totCq=0,totCg=0,totDq=0,totDg=0,totEq=0,totEg=0;
    let hTa=false,hTb=false,hTc=false,hTd=false,hTe=false;
    let produceHeaderInserted = false;
    let nonProduceHeaderInserted = false;

    for (const cat of catsToShow) {
      const s = storeInfo.cats[cat]?.[S.ch];
      if (!s) continue;
      const aq=s.a?.[0]??null, ag=s.a?.[1]??null;
      const bq=s.b?.[0]??null, bg=s.b?.[1]??null;
      const cq=s.c?.[0]??null, cg=s.c?.[1]??null;
      const dq=s.d?.[0]??null, dg=s.d?.[1]??null;
      const eq=s.e?.[0]??null, eg=s.e?.[1]??null;

      if(aq==null&&bq==null&&cq==null&&dq==null) continue;

      if(aq!=null){totAq+=aq;totAg+=(ag||0);hTa=true;}
      if(bq!=null){totBq+=bq;totBg+=(bg||0);hTb=true;}
      if(cq!=null){totCq+=cq;totCg+=(cg||0);hTc=true;}
      if(dq!=null){totDq+=dq;totDg+=(dg||0);hTd=true;}
      if(eq!=null){totEq+=eq;totEg+=(eg||0);hTe=true;}

      const isProduce = PRODUCE.includes(cat);

      // Insert "Core Produce" divider before the first produce row
      if (isProduce && !produceHeaderInserted && catsToShow.some(c => PRODUCE.includes(c))) {
        html += `<tr class="tr-produce-divider"><td colspan="13">🥬 Core Produce — High Priority</td></tr>`;
        produceHeaderInserted = true;
      }
      // Insert a subtle "Other Categories" divider row after produce block ends
      if (!isProduce && !nonProduceHeaderInserted && produceHeaderInserted) {
        html += `<tr class="tr-produce-divider" style="background:linear-gradient(90deg,#334155,#1e293b)!important"><td colspan="13">📦 Other Categories</td></tr>`;
        nonProduceHeaderInserted = true;
      }

      const rowCls = isProduce ? 'tr-produce' : '';
      html += `
      <tr class="${rowCls}">
        <td>${cat}</td>
        <td class="ca">${vcell(aq, null, false)}</td>
        <td class="ca">${vcell(ag, null, true)}</td>
        <td class="cb">${vcell(bq, aq, false)}</td>
        <td class="cb">${vcell(bg, ag, true)}</td>
        <td class="cc">${vcell(cq, null, false)}</td>
        <td class="cc">${vcell(cg, null, true)}</td>
        <td class="cd">${vcell(dq, cq, false)}</td>
        <td class="cd">${vcell(dg, cg, true)}</td>
        <td class="ce">${gbadge(dq, cq)}</td>
        <td class="ce">${gbadge(dg, cg)}</td>
        <td class="cf">${gbadge(dq, eq)}</td>
        <td class="cf">${gbadge(dg, eg)}</td>
      </tr>`;
    }

    // TOTAL row
    if (catsToShow.length > 1) {
      html += `
      <tr class="tr-tot">
        <td>TOTAL</td>
        <td class="ca">${hTa?fq(totAq):'—'}</td>
        <td class="ca">${hTa?fg(totAg):'—'}</td>
        <td class="cb">${vcell(hTb?totBq:null, hTa?totAq:null, false)}</td>
        <td class="cb">${vcell(hTb?totBg:null, hTa?totAg:null, true)}</td>
        <td class="cc">${hTc?fq(totCq):'—'}</td>
        <td class="cc">${hTc?fg(totCg):'—'}</td>
        <td class="cd">${vcell(hTd?totDq:null, hTc?totCq:null, false)}</td>
        <td class="cd">${vcell(hTd?totDg:null, hTc?totCg:null, true)}</td>
        <td class="ce">${gbadge(hTd?totDq:null, hTc?totCq:null)}</td>
        <td class="ce">${gbadge(hTd?totDg:null, hTc?totCg:null)}</td>
        <td class="cf">${gbadge(hTd?totDq:null, hTe?totEq:null)}</td>
        <td class="cf">${gbadge(hTd?totDg:null, hTe?totEg:null)}</td>
      </tr>`;
    }

    html += `
    </tbody>
  </table>
  </div>

  <!-- AI INSIGHTS PANEL -->
  <div class="ai-panel">
    <div class="ai-panel-hdr">
      <h3>Store Performance Insights</h3>
      <span class="ai-store-name">${storeInfo.name} · ${S.ch}</span>
    </div>
    <div class="ai-body" id="ai-${siteId}">
      <div class="ai-loading"><div class="spin"></div> Analysing category performance...</div>
    </div>
  </div>
</div>`;
  }

  html += `
  <div class="fnote">
    <span><strong>${m2l} Full:</strong> Complete month</span>
    <span><strong>${m1l} Full:</strong> Complete month</span>
    <span><strong>${m1l} MTD / ${curl} MTD:</strong> Day 1 to Day ${dtd} (D−1)</span>
    <span><strong>MoM:</strong> ${m1l} MTD → ${curl} MTD</span>
    <span><strong>YoY:</strong> ${DC.ly.lbl} MTD → ${curl} MTD</span>
    <span><strong>▲ green</strong> = growth · <strong>▼ red</strong> = decline</span>
  </div>`;

  document.getElementById('main').innerHTML = html;

  // Kick off async AI insights for all visible stores
  for (const [siteId, storeInfo] of Object.entries(clData)) {
    const el = document.getElementById(`ai-${siteId}`);
    if (!el) continue;
    const summaryRows = buildSummaryRows(storeInfo, catsToShow);
    fetchInsights(storeInfo.name, siteId, summaryRows, catsToShow, storeInfo).then(insights => {
      if (!document.getElementById(`ai-${siteId}`)) return; // stale
      let ihtml = '<div class="insights-grid">';
      for (const ins of insights) {
        ihtml += `<div class="ins-card ${ins.type||'info'}">
          <div class="ins-tag">${ins.tag}</div>
          <div class="ins-msg">${ins.msg}</div>
        </div>`;
      }
      ihtml += '</div>';
      el.innerHTML = ihtml;
    });
  }
}

/* ═══════════════════════════════════════════════
   CONTROLS
═══════════════════════════════════════════════ */
document.getElementById('chGrp').addEventListener('click', e => {
  const ch = e.target.dataset.ch; if (!ch) return;
  S.ch = ch;
  insightCache = {};
  document.querySelectorAll('.ch-pill').forEach(b => b.classList.toggle('on', b.dataset.ch === ch));
  render();
});

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
loadSheetData();
</script>
</body>
</html>
